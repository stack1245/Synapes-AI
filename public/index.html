<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시냅스 AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#07111f",
              panel: "#0f1728",
              panelSoft: "#162133",
              accent: "#2dd4bf",
              accentStrong: "#14b8a6",
              signal: "#fb7185",
              mist: "#cbd5e1",
            },
            fontFamily: {
              sans: ["Noto Sans KR", "sans-serif"],
              display: ["Manrope", "sans-serif"],
            },
            boxShadow: {
              panel: "0 24px 60px rgba(15, 23, 42, 0.45)",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-ink text-slate-100">
    <div class="app-backdrop"></div>
    <div class="app-grid"></div>

    <div class="relative min-h-screen overflow-hidden">
      <div id="sidebar-backdrop" class="drawer-backdrop lg:hidden"></div>
      <div id="concept-backdrop" class="drawer-backdrop xl:hidden"></div>

      <div class="relative flex min-h-screen">
        <aside
          id="sidebar"
          class="drawer sidebar-drawer glass-panel flex flex-col border-r border-white/10"
        >
          <div
            class="flex items-center justify-between border-b border-white/10 px-5 py-5"
          >
            <div>
              <p
                class="font-display text-xs uppercase tracking-[0.32em] text-accent/80"
              >
                Synapes AI
              </p>
              <h1 class="mt-2 font-display text-2xl font-semibold text-white">
                오답 세션
              </h1>
            </div>
            <button
              id="close-sidebar-button"
              class="inline-flex h-10 w-10 items-center justify-center rounded-2xl border border-white/10 bg-white/5 text-slate-300 transition hover:border-white/20 hover:bg-white/10 lg:hidden"
              type="button"
              aria-label="세션 패널 닫기"
            >
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <div class="px-5 pt-5">
            <button
              id="new-room-button"
              class="flex w-full items-center justify-between rounded-3xl border border-accent/30 bg-accent/15 px-4 py-3 font-medium text-accent shadow-panel transition hover:border-accent/50 hover:bg-accent/20"
              type="button"
            >
              <span class="flex items-center gap-3">
                <i class="fa-solid fa-plus"></i>
                <span>새 오답 세션</span>
              </span>
              <i class="fa-solid fa-pen-ruler text-sm"></i>
            </button>
          </div>

          <div class="min-h-0 flex-1 px-4 py-5">
            <div class="mb-3 flex items-center justify-between px-2">
              <span
                class="text-xs font-medium uppercase tracking-[0.28em] text-slate-400"
              >
                최근 세션
              </span>
              <span
                id="room-count"
                class="rounded-full bg-white/5 px-2 py-1 text-xs text-slate-400"
              >
                0
              </span>
            </div>

            <ul
              id="room-list"
              class="chat-scroll flex h-full flex-col gap-2 overflow-y-auto pr-1"
            ></ul>
          </div>

          <div class="border-t border-white/10 px-5 py-4">
            <button
              id="settings-button"
              class="flex w-full items-center gap-3 rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-left text-slate-300 transition hover:border-white/20 hover:bg-white/10"
              type="button"
            >
              <i class="fa-solid fa-sliders text-slate-400"></i>
              <span>설정</span>
            </button>
          </div>
        </aside>

        <main
          class="flex min-w-0 flex-1 flex-col border-x border-white/5 bg-slate-950/35"
        >
          <header class="border-b border-white/10 px-4 py-4 md:px-6">
            <div class="flex items-start justify-between gap-3">
              <div class="flex items-center gap-3">
                <button
                  id="open-sidebar-button"
                  class="inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-white/10 bg-white/5 text-slate-200 transition hover:border-white/20 hover:bg-white/10 lg:hidden"
                  type="button"
                  aria-label="세션 패널 열기"
                >
                  <i class="fa-solid fa-bars"></i>
                </button>

                <div>
                  <p
                    class="font-display text-lg font-semibold text-white md:text-xl"
                  >
                    스마트 AI 오답 노트
                  </p>
                  <p class="mt-1 text-sm text-slate-400">
                    개념 트리와 연결된 수학 튜터링 세션을 진행하세요.
                  </p>
                </div>
              </div>

              <div class="flex items-center gap-3">
                <label
                  class="hidden text-sm text-slate-400 sm:block"
                  for="mode-select"
                >
                  튜터링 모드
                </label>
                <div class="relative">
                  <select
                    id="mode-select"
                    class="appearance-none rounded-2xl border border-white/10 bg-panelSoft/80 px-4 py-3 pr-10 text-sm font-medium text-white outline-none transition focus:border-accent/50"
                  >
                    <option value="hint">힌트 모드</option>
                    <option value="solve">풀이 모드</option>
                  </select>
                  <i
                    class="fa-solid fa-chevron-down pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-xs text-slate-400"
                  ></i>
                </div>

                <button
                  id="open-concept-button"
                  class="inline-flex h-11 items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-4 text-slate-200 transition hover:border-white/20 hover:bg-white/10 xl:hidden"
                  type="button"
                >
                  <i class="fa-solid fa-diagram-project"></i>
                  <span class="hidden sm:inline">개념 트리</span>
                </button>
              </div>
            </div>

            <div class="mt-4 flex flex-wrap items-center gap-2">
              <span
                class="status-chip border-accent/25 bg-accent/10 text-accent"
              >
                <i class="fa-solid fa-bolt"></i>
                <span id="mode-chip-label">힌트 모드</span>
              </span>
              <span
                id="selected-room-chip"
                class="status-chip border-white/10 bg-white/5 text-slate-300"
              >
                세션을 선택하거나 새로 만드세요
              </span>
              <span
                id="selected-concept-chip"
                class="status-chip border-white/10 bg-white/5 text-slate-300"
              >
                개념을 선택하면 추천 흐름이 더 정확해집니다
              </span>
            </div>
          </header>

          <section class="relative min-h-0 flex-1">
            <div
              id="message-list"
              class="chat-scroll flex h-full flex-col gap-4 overflow-y-auto px-4 py-6 md:px-8"
            ></div>
          </section>

          <footer
            class="border-t border-white/10 bg-slate-950/70 px-4 py-4 md:px-6"
          >
            <form id="chat-form" class="space-y-3">
              <div
                class="rounded-[28px] border border-white/10 bg-panel/80 p-3 shadow-panel"
              >
                <textarea
                  id="message-input"
                  class="chat-textarea chat-scroll h-24 w-full resize-none border-0 bg-transparent px-2 py-2 text-[15px] leading-7 text-white outline-none placeholder:text-slate-500"
                  placeholder="헷갈리는 문제, 막힌 풀이 과정, 개념 질문을 입력해 보세요."
                ></textarea>
                <div class="mt-3 flex items-center justify-between gap-3">
                  <div class="text-xs text-slate-500">
                    엔터로 줄바꿈, 전송 버튼으로 요청합니다.
                  </div>
                  <button
                    id="send-button"
                    class="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2.5 font-display text-sm font-semibold text-slate-900 transition hover:bg-slate-200 disabled:cursor-not-allowed disabled:bg-slate-500"
                    type="submit"
                  >
                    <i class="fa-solid fa-paper-plane"></i>
                    <span>전송</span>
                  </button>
                </div>
              </div>
            </form>
          </footer>
        </main>

        <aside
          id="concept-panel"
          class="drawer concept-drawer glass-panel flex flex-col border-l border-white/10"
        >
          <div
            class="flex items-center justify-between border-b border-white/10 px-5 py-5"
          >
            <div>
              <p
                class="font-display text-xs uppercase tracking-[0.32em] text-sky-300/80"
              >
                Knowledge Graph
              </p>
              <h2 class="mt-2 font-display text-2xl font-semibold text-white">
                개념 트리
              </h2>
            </div>
            <button
              id="close-concept-button"
              class="inline-flex h-10 w-10 items-center justify-center rounded-2xl border border-white/10 bg-white/5 text-slate-300 transition hover:border-white/20 hover:bg-white/10 xl:hidden"
              type="button"
              aria-label="개념 트리 닫기"
            >
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <div class="space-y-4 px-5 py-5">
            <div class="rounded-3xl border border-white/10 bg-white/5 p-4">
              <p class="text-xs uppercase tracking-[0.28em] text-slate-400">
                현재 포커스
              </p>
              <p
                id="concept-panel-title"
                class="mt-3 font-display text-lg font-semibold text-white"
              >
                개념 로딩 중
              </p>
              <p
                id="concept-panel-description"
                class="mt-2 text-sm leading-6 text-slate-400"
              >
                오른쪽 트리에서 노드를 클릭하면 현재 학습 흐름 기준 개념으로
                선택됩니다.
              </p>
            </div>
          </div>

          <div class="min-h-0 flex-1 px-4 pb-4">
            <div
              id="cy"
              class="h-full min-h-[420px] rounded-[28px] border border-white/10 bg-slate-950/60"
            ></div>
          </div>
        </aside>
      </div>

      <div
        id="toast"
        class="pointer-events-none fixed bottom-5 left-1/2 z-[70] hidden -translate-x-1/2 rounded-2xl border border-white/10 bg-slate-950/90 px-4 py-3 text-sm text-white shadow-panel"
      ></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
